name: Backend Coverage Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'src/backend/**'
      - '.github/workflows/backend-coverage-pages.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: backend-coverage-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.14.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: src/backend/pnpm-lock.yaml

      - name: Install backend dependencies
        working-directory: src/backend
        run: pnpm install --frozen-lockfile

      - name: Generate backend coverage report
        working-directory: src/backend
        run: pnpm test:cov:html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: src/backend/coverage/lcov-report

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
